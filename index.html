<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get in the GitHub Workflow — A Beginner's Guide</title>
  <link rel="stylesheet" href="lesson.css" />
</head>
<body>

  <!-- Floating tooltip (required by tooltip system) -->
  <div id="floating-tooltip"></div>

  <!-- Sticky progress bar -->
  <div id="progress-bar-wrap">
    <div id="progress-bar-track">
      <div id="progress-bar-fill"></div>
    </div>
    <div id="progress-label">0% complete</div>
  </div>

  <!-- Page header -->
  <header class="page-header">
    <h1>Get in the <span class="accent-green">Git</span><span class="accent-purple">Hub</span> Workflow</h1>
    <p class="subtitle">A guide to version control, collaboration, and contributing to open source — one commit at a time.</p>
    <button class="reset-btn" onclick="resetProgress()">Reset Progress</button>
  </header>

  <!-- All lesson content is injected here by lesson.js -->
  <main class="lesson-body" id="lesson-root"></main>

  <script src="lesson.js"></script>
</body>
</html>
